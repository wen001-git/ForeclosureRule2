<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FCL Pipeline Explorer — Foreclosure Data Flow (Analyst / Validation View)</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --border:#2a323d;
    --txt:#d7dde5; --muted:#8b96a5; --accent:#4da3ff; --accent2:#7ee787;
    --mysql:#f29d50; --redshift:#9d7bff; --raw:#6e7681; --bps:#ff7b9c;
    --chip:#222b36;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--txt);font-size:14px;}
  header{padding:14px 22px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#11151b,#161b22);position:sticky;top:0;z-index:30;}
  .htop{display:flex;align-items:flex-start;gap:16px}
  header h1{margin:0;font-size:18px;letter-spacing:.3px}
  header p{margin:4px 0 0;color:var(--muted);font-size:12.5px;max-width:880px}
  .hctrls{margin-left:auto;display:flex;gap:8px;flex:none}
  .toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
  .toggle button{background:var(--panel2);color:var(--muted);border:none;padding:6px 12px;cursor:pointer;font-size:12.5px}
  .toggle button.on{background:var(--accent);color:#0e1116;font-weight:600}
  .views{display:flex;gap:6px;margin-top:12px}
  .views button{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:6px 14px;cursor:pointer;font-size:12.5px}
  .views button.on{border-color:var(--accent);color:var(--txt);background:var(--panel)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:6px;color:var(--muted)}
  .dot{width:11px;height:11px;border-radius:3px;display:inline-block}
  .layout{display:flex;height:calc(100vh - 150px)}
  .canvas{flex:1;overflow:auto;padding:18px 22px 60px}
  .layer{margin-bottom:10px;border:1px solid var(--border);border-radius:12px;background:var(--panel);overflow:hidden}
  .layer-head{display:flex;align-items:center;gap:12px;padding:9px 14px;background:var(--panel2)}
  .layer-num{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;color:#0e1116;flex:none}
  .layer-title{font-weight:600}
  .layer-sub{color:var(--muted);font-size:12px}
  .plat-tag{margin-left:auto;font-size:11px;color:var(--muted);border:1px solid var(--border);padding:2px 8px;border-radius:20px}
  .nodes{display:flex;flex-wrap:wrap;gap:10px;padding:14px}
  .node{border:1px solid var(--border);border-radius:10px;background:var(--panel2);padding:10px 12px;min-width:185px;max-width:270px;cursor:pointer;transition:.15s;position:relative;flex:1 1 200px}
  .node:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.35)}
  .node.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(77,163,255,.35)}
  .node .nm{font-weight:600;font-size:13px;word-break:break-word}
  .node .ds{color:var(--muted);font-size:11.5px;margin-top:4px;line-height:1.4}
  .node .badge{position:absolute;top:8px;right:8px;width:9px;height:9px;border-radius:3px}
  .node .rows{margin-top:7px;font-size:11px;color:var(--accent2)}
  .arrow{text-align:center;color:var(--muted);font-size:12px;padding:2px 0 8px}
  .arrow b{color:var(--accent)}
  /* status view */
  .secblock{border:1px solid var(--border);border-radius:12px;background:var(--panel);margin-bottom:16px;overflow:hidden}
  .secblock h2{margin:0;padding:11px 16px;font-size:14px;background:var(--panel2);border-bottom:1px solid var(--border)}
  .secblock .inner{padding:14px 16px}
  .codegrid{display:flex;flex-wrap:wrap;gap:8px}
  .codecard{border:1px solid var(--border);border-radius:9px;background:var(--panel2);padding:9px 11px;min-width:150px;cursor:pointer;flex:1 1 160px;transition:.12s}
  .codecard:hover{border-color:var(--accent);transform:translateY(-1px)}
  .codecard .c{font-family:"Cascadia Code",Consolas,monospace;font-weight:700;font-size:15px}
  .codecard .m{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.35}
  .codecard .n{font-size:11px;color:var(--accent2);margin-top:5px}
  .flow{display:flex;flex-wrap:wrap;align-items:center;gap:7px;font-family:"Cascadia Code",Consolas,monospace;font-size:13px;line-height:2}
  .pill2{border:1px solid var(--border);border-radius:7px;padding:4px 10px;background:var(--panel2);cursor:pointer}
  .pill2:hover{border-color:var(--accent)}
  .ar{color:var(--accent)}
  .charwrap{display:flex;flex-wrap:wrap;gap:6px}
  .charcard{border:1px solid var(--border);border-radius:7px;background:var(--panel2);padding:6px 10px;text-align:center;min-width:54px}
  .charcard b{font-family:"Cascadia Code",Consolas,monospace;font-size:16px;color:var(--accent)}
  .charcard span{display:block;font-size:10.5px;color:var(--muted);margin-top:2px}
  /* detail drawer */
  .drawer{width:440px;flex:none;border-left:1px solid var(--border);background:var(--panel);overflow-y:auto;padding:0}
  .drawer.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center;padding:30px;font-size:13px}
  .d-head{padding:16px 18px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:5}
  .d-head .pill{font-size:11px;padding:2px 9px;border-radius:20px;color:#0e1116;font-weight:600}
  .d-head h2{margin:8px 0 2px;font-size:16px;word-break:break-all}
  .d-head .path{color:var(--muted);font-size:12px}
  .d-body{padding:14px 18px}
  .sec{margin-bottom:18px}
  .sec h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin:0 0 8px;border-bottom:1px solid var(--border);padding-bottom:5px}
  .kv{font-size:13px;line-height:1.6}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:var(--chip);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11.5px;font-family:"Cascadia Code",Consolas,monospace}
  table.mini{width:100%;border-collapse:collapse;font-size:12px}
  table.mini th,table.mini td{text-align:left;padding:5px 7px;border-bottom:1px solid var(--border)}
  table.mini th{color:var(--muted);font-weight:600}
  .bar{height:7px;background:var(--accent);border-radius:4px;display:inline-block;vertical-align:middle;min-width:2px}
  pre{background:#0b0e12;border:1px solid var(--border);border-radius:8px;padding:11px;overflow:auto;font-family:"Cascadia Code",Consolas,monospace;font-size:11.5px;line-height:1.5;color:#cfe3ff;margin:0}
  .sqlwrap{position:relative}
  .copy{position:absolute;top:7px;right:7px;font-size:10.5px;background:var(--chip);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:3px 7px;cursor:pointer}
  .copy:hover{color:var(--txt);border-color:var(--accent)}
  .lin{font-size:12.5px;color:var(--muted);line-height:1.7}
  .lin code{color:var(--accent2);font-family:"Cascadia Code",Consolas,monospace}
  .upstream{color:var(--mysql)} .downstream{color:var(--bps)}
  .jump{background:var(--chip);border:1px solid var(--accent);color:var(--accent);border-radius:6px;padding:5px 11px;cursor:pointer;font-size:12px;margin-top:4px}
  .jump:hover{background:var(--accent);color:#0e1116}
  .searchbar{margin-top:10px}
  .searchbar input{width:280px;max-width:60%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;color:var(--txt);padding:7px 11px;font-size:13px}
  .dim{opacity:.25;filter:grayscale(.6)}
  .note{font-size:11.5px;color:var(--muted);background:var(--panel2);border:1px dashed var(--border);border-radius:8px;padding:9px 11px;line-height:1.55}
  .pagehead{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:10px;padding:11px 14px;margin-bottom:14px;font-size:12.5px;line-height:1.55}
  .pagehead .ph-row{display:flex;gap:10px;margin:4px 0}
  .pagehead .ph-row+.ph-row{padding-top:4px;border-top:1px dashed var(--border)}
  .pagehead .ph-lbl{flex:0 0 92px;color:var(--accent);font-weight:600;white-space:nowrap}
  .pagehead .ph-val{color:var(--txt)}
  .foot{color:var(--muted);font-size:11px;padding:14px 22px;border-top:1px solid var(--border)}
  .hidden{display:none}
  /* BPS field-lineage screens */
  .subsw{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
  .subsw button{background:var(--panel2);color:var(--muted);border:1px solid var(--border);border-radius:8px;padding:6px 13px;cursor:pointer;font-size:12.5px}
  .subsw button.on{border-color:var(--accent);color:var(--txt);background:var(--panel)}
  .scrn{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;align-items:start}
  .pnl{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--panel)}
  .pnl.span2{grid-column:span 2}.pnl.span3{grid-column:span 3}
  .pnl-h{background:#1f4e79;color:#fff;font-weight:600;font-size:12.5px;padding:7px 11px;text-align:center}
  table.sct{width:100%;border-collapse:collapse;font-size:11.5px}
  table.sct th{background:#2e6094;color:#fff;font-weight:600;padding:5px 7px;text-align:left;font-size:11px}
  table.sct td{padding:5px 7px;border-bottom:1px solid var(--border)}
  .fcell{cursor:pointer;color:var(--accent)}
  .fcell:hover{background:rgba(77,163,255,.12);text-decoration:underline}
  .frow:hover{background:rgba(77,163,255,.06)}
  .lkrole{display:inline-block;min-width:118px;color:var(--muted);font-size:11px}
  .lkpath{font-family:"Cascadia Code",Consolas,monospace;font-size:11px;color:var(--accent2);word-break:break-all}
  .linehop{display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px dashed var(--border)}
  .copy2{margin-left:auto;font-size:10px;background:var(--chip);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:2px 6px;cursor:pointer;flex:none}
  .copy2:hover{color:var(--txt);border-color:var(--accent)}
  /* lineage graph */
  .graphwrap{position:relative;overflow:auto;height:100%;background:#0b0e12}
  .gtoolbar{position:sticky;top:0;left:0;z-index:6;display:flex;gap:8px;padding:8px 12px;background:var(--panel2);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
  .gtoolbar button{background:var(--panel);border:1px solid var(--border);color:var(--txt);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px}
  .gtoolbar button:hover{border-color:var(--accent)}
  .glegend{display:flex;gap:12px;margin-left:auto;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .glegend span{display:inline-flex;align-items:center;gap:5px}
  svg.glineage{display:block}
  .gnode{cursor:pointer}
  .gnode:hover rect{stroke:var(--accent)!important}
  .gdim{opacity:.16}
  .gelabel{fill:#8b96a5}
  .gcolhead{fill:#8b96a5;font-weight:700}
  .miniln{display:block;margin-bottom:8px}
  /* primer flowcharts */
  .flowwrap{overflow:auto;border:1px solid var(--border);border-radius:10px;background:#0b0e12;padding:6px;margin:4px 0 10px}
  svg.fchart .fnode{cursor:default}
  svg.fchart .fnode.clk{cursor:pointer}
  svg.fchart .fnode.clk:hover rect{stroke:#fff;stroke-width:2.4}
  svg.fchart .fedge{fill:none;stroke:#8b96a5;stroke-width:1.6}
  svg.fchart .felabel{fill:#9fb0c3;font-size:10px}
  svg.fchart text.ft1{font-size:11px;font-weight:700;fill:#15202b}
  svg.fchart text.ft2{font-size:9px;fill:#33414f}
</style>
</head>
<body>
<header>
  <div class="htop">
    <div>
      <h1 id="h-title">🏚️ FCL Pipeline Explorer</h1>
      <p id="h-sub"></p>
    </div>
    <div class="hctrls">
      <div class="toggle">
        <button id="lang-en" class="on" onclick="setLang('en')">EN</button>
        <button id="lang-zh" onclick="setLang('zh')">中文</button>
      </div>
    </div>
  </div>
  <div class="views">
    <button id="v-fields" class="on" onclick="setView('fields')"></button>
    <button id="v-pipeline" onclick="setView('pipeline')"></button>
    <button id="v-graph" onclick="setView('graph')"></button>
    <button id="v-status" onclick="setView('status')"></button>
    <button id="v-primer" onclick="setView('primer')"></button>
  </div>
  <div class="legend" id="legend"></div>
  <div class="searchbar" id="searchbar"><input id="search" oninput="doSearch(this.value)"></div>
</header>

<div class="layout">
  <div class="canvas" id="canvas"></div>
  <div class="drawer empty" id="drawer"></div>
</div>
<div class="foot" id="foot"></div>

    +`<div class="ph-row"><span class="ph-lbl">${t('pgHow')}</span><span class="ph-val">${L(d.how)}</span></div>`

}

/* ---- auto-generate Fetch SQL (取数逻辑) for every field from its lineage ---- */
function _parsePath(p){ if(!p||p.indexOf('—')===0) return null; const a=p.split('.'); if(a.length<4) return null; return {schema:a[1],table:a[2],col:a.slice(3).join('.')}; }
Object.keys(FIELDS).forEach(id=>{
  const f=FIELDS[id]; if(f.sql) return;
  const bps=f.line.find(h=>h.r==='rBps'), nz=f.line.find(h=>h.r==='rNz');
  const b=bps?_parsePath(bps.p):null, n=nz?_parsePath(nz.p):null;
  const decode=f.calc&&/解码|decode/i.test(typeof f.calc==='object'?((f.calc.zh||'')+(f.calc.en||'')):String(f.calc));
  let sql='';
  if(b){ const snap=b.table==='sync_fcl_stage_info'?"\n  AND fctrdt=(SELECT MAX(fctrdt) FROM bpms_dev.sync_fcl_stage_info)":"";
    sql+="-- BPS 显示值 / BPS displayed value\nSELECT loanid, "+b.col+"\nFROM "+b.schema+"."+b.table+"\nWHERE loanid=:loanid"+snap+";"; }
  if(n){ sql+=(sql?"\n\n":"")+(decode?"-- Newrez 原始编码（ETL 解码为上面文本）/ raw code → ETL-decoded\n":"-- Newrez 取数（最新快照）/ source value (latest snapshot)\n")
      +"SELECT loanid, "+n.col+"\nFROM "+n.schema+"."+n.table+"\nWHERE loanid=:loanid AND dataasof=(SELECT MAX(dataasof) FROM "+n.schema+"."+n.table+");"; }
  else if(b){ sql+="\n\n-- 无 Newrez 源（系统配置 / ETL 计算 / 派生）/ no Newrez source (config or derived)"; }
  f.sql=sql||null;
});

/* =================== FIELD-VIEW RENDER =================== */
function fcell(id,text,extra){const on=activeSel&&activeSel.type==='field'&&activeSel.id===id?' on':'';return `<span class="fcell${on}"${extra||''} onclick="selectField('${id}')">${text}</span>`;}
function setFieldsScreen(s){
  if(activeSel&&((s!=='panels'&&activeSel.type==='panel')||(s==='panels'&&activeSel.type==='field'))){activeSel=null;drawerEmpty();}
  fieldsScreen=s;renderView();
}

function renderFields(){
  const c=document.getElementById('canvas');
  let h=pageHeader('fields')+`<div class="subsw">
    <button class="${fieldsScreen==='panels'?'on':''}" onclick="setFieldsScreen('panels')">${t('fScreenPanels')}</button>
    <button class="${fieldsScreen==='detail'?'on':''}" onclick="setFieldsScreen('detail')">${t('fScreenDetail')}</button>
    <button class="${fieldsScreen==='stage'?'on':''}" onclick="setFieldsScreen('stage')">${t('fScreenStage')}</button>
    <button class="${fieldsScreen==='timeline'?'on':''}" onclick="setFieldsScreen('timeline')">${t('fScreenTimeline')}</button>
    <button class="${fieldsScreen==='example'?'on':''}" onclick="setFieldsScreen('example')">${t('fScreenExample')}</button>
  </div>`;
  const intro=fieldsScreen==='panels'?t('bpsIntro'):fieldsScreen==='example'?t('exIntro'):t('fIntro')+'<br>'+t('fClickHint');
  h+=`<div class="note" style="margin-bottom:12px">${intro}</div>`;
  if(fieldsScreen==='panels') h+=panelsHTML();
  else if(fieldsScreen==='detail') h+=detailHTML();
  else if(fieldsScreen==='stage') h+=stageHTML();
  else if(fieldsScreen==='timeline') h+=timelineHTML();
  else h+=exampleHTML();
  c.innerHTML=h;
}

let exLoan='7727000088';

function copyExampleMd(btn){
  const E=EXAMPLES[exLoan]; if(!E) return;
  const stLabel={match:t('exMatch'),stale:t('exStale'),na:t('exNA')};
  let md=`# Loan ${exLoan} · ${E.servicer} · ${E.state} · ${E.jud}\n\n> ${L(E.meta)}\n> ⚠ = dev BPS table lags the latest raw snapshot (doc 12 §14.0)\n`;
  E.groups.forEach(g=>{
    md+=`\n## ${L(g.t)}\n\n| ${t('exColField')} | ${t('exColRaw')} | ${t('exColRule')} | ${t('exColBps')} | ${t('exColState')} |\n|---|---|---|---|---|\n`;
    g.rows.forEach(r=>{ const cell=s=>String(s==null?'':s).replace(/\|/g,'\\|').replace(/\n/g,' ');
      md+=`| ${cell(r.f)} | ${cell(r.raw)} | ${cell(L(r.rule))} | ${cell(r.bps)} | ${cell(stLabel[r.st])} |\n`; });
  });
  navigator.clipboard.writeText(md).then(()=>{ if(btn){ const o=btn.textContent; btn.textContent=t('exCopied'); setTimeout(()=>btn.textContent=o,1300); } });
}

const LMCODE={lmdeal:'deal',lmprogram:'program',lmstatus:'lmc_status',lmdecision:'final_disposition',denialreason:'denialreason',borrowerintention:'borrower_intentions'};
function doc14FieldSQL(f){
  const nz=(f.line||[]).find(h=>h.r==='rNz'); if(!nz||!nz.p||nz.p.indexOf('—')===0) return null;
  const a=nz.p.split('.'); if(a.length<4) return null; const table=a[2], col=a.slice(3).join('.');
  if(col.indexOf('/')>=0) return null;
  if(LMCODE[col]){ const bc=LMCODE[col];
    return `-- doc 14 口径验证 SQL（LM 编码解码）/ doc 14-style verify (LM code decode)\n`
      +`-- 源: newrez.portnewrezlm.${col} × bpms_dev.sync_loan_foreclosure_loss_mitigation.${bc} | 运行: mysql_bpms_dev（跨库 JOIN）| 解码源 Redshift portnewrezdatadic\n`
      +`WITH latest_lm AS (\n  SELECT loanid, dealstartdate, ${col},\n         ROW_NUMBER() OVER (PARTITION BY loanid, dealstartdate ORDER BY dataasof DESC) AS rn\n  FROM newrez.portnewrezlm WHERE ${col} IS NOT NULL )\n`
      +`SELECT l.${col}, b.${bc}, COUNT(*) AS cnt\nFROM latest_lm l\nJOIN bpms_dev.sync_loan_foreclosure_loss_mitigation b\n  ON l.loanid=b.loanid AND l.dealstartdate=b.cycle_opened_date\nWHERE l.rn=1 AND b.${bc} IS NOT NULL AND b.${bc} != ''\nGROUP BY l.${col}, b.${bc} ORDER BY l.${col}, cnt DESC;`;
  }
  if(NZ_DATE.has(col)||/date$/.test(col)||NZ_AMOUNT.has(col)){
    return `-- doc 14 口径验证 SQL（取样）/ doc 14-style verify (sample latest snapshot)\n`
      +`-- 源表 newrez.${table}.${col} | 运行 mysql_dev | 最新快照 dataasof=MAX\n`
      +`SELECT loanid, dataasof, ${col}\nFROM   newrez.${table}\nWHERE  dataasof = (SELECT MAX(dataasof) FROM newrez.${table})\n  AND  ${col} IS NOT NULL\nORDER  BY dataasof DESC LIMIT 10;`;
  }
  return `-- doc 14 口径验证 SQL（取值范围/分布）/ doc 14-style verify (value range)\n`
    +`-- 源表 newrez.${table}.${col} | 运行 mysql_dev | 最新快照 dataasof=MAX\n`
    +`SELECT dataasof AS data_date, ${col} AS val, COUNT(*) AS cnt\nFROM   newrez.${table}\nWHERE  dataasof = (SELECT MAX(dataasof) FROM newrez.${table})\n  AND  ${col} IS NOT NULL AND ${col} != ''\nGROUP  BY dataasof, ${col} ORDER BY cnt DESC LIMIT 30;`;

/* =================== LINEAGE GRAPH (pure SVG layered DAG, auto-derived from FIELDS) =================== */
let graphExpanded=new Set(), graphFocus=null, graphZoom=1;
const NODE_DB_COLOR={newrez:'#f29d50',port:'#9d7bff',bpms:'#ff7b9c',view:'#e0a3c0',cfg:'#6e7681'};
const EDGE_COLOR={copy:'#6e7681',decode:'#7ee787',coalesce:'#4da3ff',track:'#f29d50',computed:'#9d7bff',config:'#ff7b9c',map:'#8b96a5'};
function _ghop(p){ if(!p||p.indexOf('—')===0) return null; const a=p.split('.'); if(a.length<4) return null; return {db:a[0],schema:a[1],table:a[2],col:a.slice(3).join('.'),tbl:a[0]+'.'+a[1]+'.'+a[2],path:p}; }
function _gtier(h){ if(h.schema==='newrez') return 0; if(h.schema==='port') return 1; if(/biz_data_view/.test(h.table)) return 3; return 2; }
function _gkey(h){ if(h.schema==='newrez') return 'newrez'; if(h.schema==='port') return 'port'; if(/biz_data_view/.test(h.table)) return 'view'; return 'bpms'; }
function edgeCat(calc){ const s=calc?(typeof calc==='object'?((calc.zh||'')+' '+(calc.en||'')):String(calc)):'';
  if(/解码|decode/i.test(s)) return 'decode';
  if(/COALESCE/i.test(s)) return 'coalesce';
  if(/MIN\(dataasof|追踪|track/i.test(s)) return 'track';
  if(/DATEDIFF|TO_DAYS|today|−|计算|comput/i.test(s)) return 'computed';
  if(/直接取值|Direct/i.test(s)) return 'copy';
  return 'map'; }
/* reverse map: BPS display path -> field id (unique) */
const PATH2FIELD={};
Object.keys(FIELDS).forEach(id=>{ const b=(FIELDS[id].line||[]).find(h=>h.r==='rBps'); const hp=b?_ghop(b.p):null; if(hp) PATH2FIELD[hp.path]=id; });
function fieldOfPath(path){ if(PATH2FIELD[path]) return PATH2FIELD[path]; // else any field whose any hop == path
  let hit=null; Object.keys(FIELDS).some(id=>{ if((FIELDS[id].line||[]).some(h=>h.p===path)){hit=id;return true;} return false;}); return hit; }

function buildGraph(expanded){
  const nodes={}, edges={};
  const add=o=>{ if(!nodes[o.id]) nodes[o.id]=o; return nodes[o.id]; };
  Object.keys(FIELDS).forEach(id=>{
    const f=FIELDS[id];
    const hops=(f.line||[]).map(h=>_ghop(h.p)).filter(Boolean).sort((a,b)=>_gtier(a)-_gtier(b));
    const seq=hops.map(h=>{ const tbl=h.tbl;
      if(expanded.has(tbl)){ add({id:tbl,label:h.table,db:_gkey(h),tier:_gtier(h),kind:'thead',table:tbl,group:tbl}); add({id:h.path,label:h.col,db:_gkey(h),tier:_gtier(h),kind:'field',table:tbl,group:tbl}); return h.path; }
      add({id:tbl,label:h.table,db:_gkey(h),tier:_gtier(h),kind:'table',table:tbl,group:tbl}); return tbl; });
    const hasUp=hops.some(h=>_gtier(h)<2), cfg=(f.line||[]).some(h=>h.r==='rCfg'||h.r==='rDerive');
    if(!hasUp&&cfg&&seq.length){ add({id:'__CFG__',label:'config / ETL',db:'cfg',tier:0,kind:'table',table:'__CFG__',group:'__CFG__'}); seq.unshift('__CFG__'); }
    const cat=edgeCat(f.calc);
    for(let i=0;i<seq.length-1;i++){ const from=seq[i],to=seq[i+1]; if(from===to) continue;
      const c=(i+1===seq.length-1)?cat:'copy', ek=from+'>>'+to;
      if(!edges[ek]) edges[ek]={from,to,cat:c,fields:[id]};
      else { if(edges[ek].cat==='copy'&&c!=='copy') edges[ek].cat=c; if(edges[ek].fields.indexOf(id)<0) edges[ek].fields.push(id); } }
  });
  return {nodes:Object.values(nodes), edges:Object.values(edges)};
}
function renderGraph(){
  const g=buildGraph(graphExpanded);
  const COL=250,NW=212,NH=28,VG=10,GGAP=16,TOP=48,LEFT=18,IND=16,pos={},cards=[];
  const tiers={}; g.nodes.forEach(n=>{ (tiers[n.tier]=tiers[n.tier]||[]).push(n); });
  const gfCount={}; g.nodes.forEach(n=>{ if(n.kind==='field') gfCount[n.group]=(gfCount[n.group]||0)+1; });
  let maxBottom=TOP;
  Object.keys(tiers).forEach(tk=>{ const ti=+tk, arr=tiers[tk], groups={};
    arr.forEach(n=>{ (groups[n.group]=groups[n.group]||[]).push(n); });
    let y=TOP;
    Object.keys(groups).sort().forEach(gk=>{ const mem=groups[gk];
      mem.sort((a,b)=>{ const af=a.kind==='field'?1:0,bf=b.kind==='field'?1:0; if(af!==bf) return af-bf; return a.label<b.label?-1:a.label>b.label?1:0; });
      const startY=y; let hasThead=false;
      mem.forEach(n=>{ const inset=n.kind==='field'?IND:0; pos[n.id]={x:LEFT+ti*COL+inset,y,w:NW-inset}; if(n.kind==='thead')hasThead=true; y+=NH+VG; });
      if(hasThead){ const col=NODE_DB_COLOR[mem[0].db]||'#888'; cards.push({x:LEFT+ti*COL-5,y:startY-5,w:NW+10,h:(y-VG)-startY+10,col}); }
      y+=GGAP;
    });
    maxBottom=Math.max(maxBottom,y);
  });
  const W=LEFT+4*COL, H=maxBottom+24;
  let lit=null;
  if(graphFocus){ lit=new Set([graphFocus]); const adj={}; g.edges.forEach(e=>{ (adj[e.from]=adj[e.from]||[]).push(e.to); (adj[e.to]=adj[e.to]||[]).push(e.from); }); const st=[graphFocus]; while(st.length){ const c=st.pop(); (adj[c]||[]).forEach(x=>{ if(!lit.has(x)){lit.add(x);st.push(x);} }); } }
  let cardSvg=cards.map(c=>`<rect x="${c.x}" y="${c.y}" width="${c.w}" height="${c.h}" rx="10" fill="${c.col}" fill-opacity="0.06" stroke="${c.col}" stroke-opacity="0.4" stroke-width="1"></rect>`).join('');
  let ed='',lb='';
  g.edges.forEach(e=>{ const a=pos[e.from],b=pos[e.to]; if(!a||!b) return;
    const x1=a.x+(a.w||NW),y1=a.y+NH/2,x2=b.x,y2=b.y+NH/2,mx=(x1+x2)/2;
    const on=lit&&lit.has(e.from)&&lit.has(e.to), dim=graphFocus&&!on?' class="gdim"':'';
    ed+=`<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}" fill="none" stroke="${EDGE_COLOR[e.cat]||'#3a4654'}" stroke-width="${on?2.6:1.4}"${dim} style="cursor:pointer" onclick="graphEdgeClick('${e.from}','${e.to}')"></path>`;
    lb+=`<text x="${mx}" y="${(y1+y2)/2-3}" text-anchor="middle" class="gelabel" font-size="10"${dim} style="pointer-events:none">${e.cat}</text>`;
  });
  let nd='';
  g.nodes.forEach(n=>{ const p=pos[n.id]; if(!p) return; const w=p.w||NW; const col=NODE_DB_COLOR[n.db]||'#888';
    if(n.kind==='thead'){ const cnt=gfCount[n.group]||0, lab=n.label.length>22?n.label.slice(0,20)+'…':n.label;
      nd+=`<g class="gnode" onclick="graphNodeClick('${n.id}','thead')"><title>${esc(n.table)} — ${esc(t('gCollapseOne'))}</title>`
        +`<rect x="${p.x}" y="${p.y}" width="${w}" height="${NH}" rx="7" fill="${col}" fill-opacity="0.2" stroke="${col}" stroke-width="1.9"></rect>`
        +`<text x="${p.x+10}" y="${p.y+NH/2+4}" fill="#d7dde5" font-size="11" font-weight="bold">▾ ${esc(lab)} (${cnt})</text>`
        +`<text x="${p.x+w-7}" y="${p.y+NH/2+3}" text-anchor="end" fill="#8b96a5" font-size="8.5">✕ collapse</text></g>`;
      return; }
    const dim=graphFocus&&lit&&!lit.has(n.id)?' gdim':'';
    const mark=(n.kind==='table'&&n.id!=='__CFG__')?'▸ ':''; const lab=n.label.length>27?n.label.slice(0,25)+'…':n.label;
    nd+=`<g class="gnode${dim}" onclick="graphNodeClick('${n.id}','${n.kind}')"><title>${esc(n.table==='__CFG__'?'config / ETL derived':n.table+(n.kind==='field'?'.'+n.label:''))}</title>`
      +`<rect x="${p.x}" y="${p.y}" width="${w}" height="${NH}" rx="7" fill="#161b22" stroke="${col}" stroke-width="${n.kind==='field'?1.2:1.8}"></rect>`
      +`<circle cx="${p.x+12}" cy="${p.y+NH/2}" r="4" fill="${col}"></circle>`
      +`<text x="${p.x+22}" y="${p.y+NH/2+4}" fill="#d7dde5" font-size="${n.kind==='field'?10:11}">${mark}${esc(lab)}</text></g>`;
  });
  let heads=''; for(let ti=0;ti<4;ti++) heads+=`<text x="${LEFT+ti*COL}" y="26" class="gcolhead" font-size="12">${esc(t('gCol'+ti))}</text>`;
  const svg=`<svg class="glineage" width="${W}" height="${H}" style="transform:scale(${graphZoom});transform-origin:0 0">${heads}${cardSvg}${ed}${lb}${nd}</svg>`;

/* per-field mini lineage SVG (used in selectField) */
// wrap a label string to fit maxPx: break ASCII at spaces (words stay whole), CJK breaks per-char
function _wrapLabel(str,maxPx,fp){ fp=fp||8.5;
  const cw=ch=>(ch.charCodeAt(0)<128?fp*0.55:fp);
  const toks=String(str).match(/\s+|[!-~]+|[^\s!-~]/g)||[];
  const lines=[]; let cur='',curw=0;
  toks.forEach(tk=>{ const isWs=/^\s+$/.test(tk), tw=[...tk].reduce((a,c)=>a+cw(c),0);
    if(cur&&curw+tw>maxPx){ lines.push(cur.replace(/\s+$/,''));
      if(isWs){ cur=''; curw=0; } else { cur=tk; curw=tw; } }
    else { cur+=tk; curw+=tw; } });

function miniLineageSVG(f){
  const hops=(f.line||[]).map(h=>_ghop(h.p)).filter(Boolean).sort((a,b)=>_gtier(a)-_gtier(b));
  if(!hops.length) return '';
  const cat=edgeCat(f.calc);
  const calcTxt=(L(f.calc)||'').replace(/\s+/g,' ').trim();
  const NW=300,NH=38,W=NW+18,LH=11;
  let y=4,svg='',prev=null;
  hops.forEach((h,i)=>{ const col=NODE_DB_COLOR[_gkey(h)]||'#888';
    if(prev){ const last=(i===hops.length-1), c=last?cat:'copy';
      const lines=(last&&calcTxt)?_wrapLabel(calcTxt,W-30):[c];
      const gap=Math.max(30,lines.length*LH+14), top=prev+NH;
      y=top+gap;
      svg+=`<line x1="14" y1="${top}" x2="14" y2="${y}" stroke="${EDGE_COLOR[c]||'#3a4654'}" stroke-width="2"></line>`;
      let ly=top+(gap-lines.length*LH)/2+9;
      lines.forEach(t=>{ svg+=`<text x="22" y="${ly}" fill="#9fb0c3" font-size="8.5">${esc(t)}</text>`; ly+=LH; });
    }
    svg+=`<g><rect x="2" y="${y}" width="${NW}" height="${NH}" rx="6" fill="#161b22" stroke="${col}" stroke-width="1.4"></rect>`
      +`<circle cx="12" cy="${y+NH/2}" r="3.5" fill="${col}"></circle>`
      +`<text x="22" y="${y+12}" fill="#8b96a5" font-size="7.5">${esc(h.db)}</text>`
      +`<text x="22" y="${y+23}" fill="#cfe3ff" font-size="9.5" font-family="Consolas,monospace">${esc(h.schema+'.'+h.table)}</text>`
      +`<text x="22" y="${y+33}" fill="#7ee787" font-size="9" font-family="Consolas,monospace">${esc('.'+h.col)}</text></g>`;
    prev=y;
  });
  const H=y+NH+4;
  return `<svg class="miniln" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${svg}</svg>`;
}

function drawFlow(spec){
  const pos={}; spec.nodes.forEach(n=>pos[n.id]=n);
  const W=n=>n.w||120, H=n=>n.h||46;
  const anchor=(n,d)=>{const w=W(n),h=H(n); return d==='r'?[n.x+w,n.y+h/2]:d==='l'?[n.x,n.y+h/2]:d==='b'?[n.x+w/2,n.y+h]:[n.x+w/2,n.y];};
  let ed='';
  spec.edges.forEach(e=>{ const s=pos[e.from],t=pos[e.to]; if(!s||!t) return;
    const scx=s.x+W(s)/2,scy=s.y+H(s)/2,tcx=t.x+W(t)/2,tcy=t.y+H(t)/2,dx=tcx-scx,dy=tcy-scy; let sd,td;
    if(Math.abs(dx)>=Math.abs(dy)){sd=dx>0?'r':'l';td=dx>0?'l':'r';}else{sd=dy>0?'b':'t';td=dy>0?'t':'b';}
    const a=anchor(s,sd),b=anchor(t,td),x1=a[0],y1=a[1],x2=b[0],y2=b[1],k=42; let c1x=x1,c1y=y1,c2x=x2,c2y=y2;
    if(sd==='r')c1x+=k;else if(sd==='l')c1x-=k;else if(sd==='b')c1y+=k;else c1y-=k;
    if(td==='r')c2x+=k;else if(td==='l')c2x-=k;else if(td==='b')c2y+=k;else c2y-=k;
    const ms=e.dir==='bi'?' marker-start="url(#fa)"':'';
    ed+=`<path class="fedge" d="M${x1},${y1} C${c1x},${c1y} ${c2x},${c2y} ${x2},${y2}" marker-end="url(#fa)"${ms}></path>`;
    if(e.label){const mx=(x1+x2)/2,my=(y1+y2)/2,lw=e.label.length*9+8; ed+=`<rect x="${mx-lw/2}" y="${my-13}" width="${lw}" height="15" rx="3" fill="#0b0e12" opacity="0.88"></rect><text class="felabel" x="${mx}" y="${my-2}" text-anchor="middle">${esc(e.label)}</text>`;}
  });
  let nd='';
  spec.nodes.forEach(n=>{ const w=W(n),h=H(n),clk=n.code||n.stage,oc=n.code?`onclick="primerGoStatus('${n.code}')"`:(n.stage?`onclick="gotoStageTab()"`:'');
    nd+=`<g class="fnode${clk?' clk':''}" ${oc}><rect x="${n.x}" y="${n.y}" width="${w}" height="${h}" rx="8" fill="${n.fill||'#cfe0f5'}" stroke="#5b6b7d" stroke-width="1.3"></rect>`
      +`<text class="ft1" x="${n.x+w/2}" y="${n.y+(n.t2?h/2-1:h/2+4)}" text-anchor="middle">${esc(n.t1)}</text>`
      +(n.t2?`<text class="ft2" x="${n.x+w/2}" y="${n.y+h/2+12}" text-anchor="middle">${esc(n.t2)}</text>`:'')+`</g>`;
  });
  return `<div class="flowwrap"><svg class="fchart" width="${spec.w}" height="${spec.h}" viewBox="0 0 ${spec.w} ${spec.h}">`
    +`<defs><marker id="fa" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#8b96a5"></path></marker></defs>`+ed+nd+`</svg></div>`;
}

   +`<button class="jump" style="margin-top:10px" onclick="gotoStageTab()">${t('prToStage')}</button></div></div>`;
  // 7
  h+=`<div class="secblock"><h2>${t('pr7')}</h2><div class="inner">`
   +`<div class="kv"><b>Foreclosure（止赎）</b>由<b>贷款方/Servicer</b>发起（≥120 天逾期且完成 LM 告知义务后），经法律程序强制出售抵押房产收回欠款。<b>Bankruptcy（破产）</b>由<b>借款人</b>主动申请，立即触发 <b>Automatic Stay（自动中止令，11 U.S.C. §362）</b>停止一切催收（含止赎）。</div>`
   +`<div style="margin-top:10px">`+tbl(['章节','适用','类型'],[['<code>Chapter 7</code>','个人/企业','清算型：变卖资产偿债，剩余债务豁免'],['<code>Chapter 11</code>','主要企业','企业重组'],['<code>Chapter 13</code>','有固定收入个人','个人重组：3–5 年还款计划，可保房']])+`</div>`
   +`<div style="margin-top:10px">`+tbl(['维度','Chapter 7','Chapter 13'],[['核心机制','清除个人债务 Discharge','3–5 年还款计划补缴'],['房子能保住','通常不能','通常能（计划完成后）'],['持续时间','3–6 个月','3–5 年'],['FCL 结果','Stay 暂停 FCL；BK 后通常恢复止赎','Stay 暂停 FCL；计划完成 FCL 撤销 → delinq C']])+`</div>`
   +`<div class="note" style="margin-top:10px"><b>Lien 不随债务清除而消失（Ch.7）</b>：抵押贷款 = 两层 —— ① 个人还款责任（Ch.7 可清除 ✅）；② 房产抵押权 Mortgage Lien（Ch.7 不能清除 ❌，Lien 依附房产不依附人）。结果：Ch.7 后银行仍可止赎拍卖，只是<b>差额 Deficiency 不能再向个人追偿</b>。"破产清除债务" ≠ "还清债务"——银行没收到钱，Lien 不消失。</div>`
   +`<h3 style="margin-top:14px">FCL + BK 并存时系统如何表达</h3>`
   +tbl(['系统字段','值','说明'],[['<code>delinq</code>','<code>FCL</code>（不变）','止赎状态不因 BK 退回 D120P'],['<code>bankruptcy</code>','<code>Y</code>','标注处于破产保护'],['<code>fchold1description</code>','<code>Bankruptcy / BK Auto-Stay</code>','Hold 原因：破产自动中止令']])
   +`<div class="note" style="margin-top:8px">Newrez 原始描述：<code>Foreclosure / Perf BK</code>（止赎中 + 按 Ch.13 还款）与 <code>Foreclosure / Non-Perf BK</code>（止赎中 + 未按计划），两者 delinq 均为 <code>FCL</code>，区别在 BK 履约状态。</div></div></div>`;
